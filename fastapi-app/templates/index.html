<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        :root {
            --primary: #534AB7;
            --primary-hover: #3C3489;
            --primary-light: #7F77DD;
            --bg: #F4F3FA;
            --surface: #FFFFFF;
            --border: #E6E4EE;
            --text: #1a1a1a;
            --text-muted: #6B6880;
            --text-dim: #9b98a8;
            --danger: #E24B4A;
            --danger-bg: #FCEBEB;
            --shadow-sm: 0 1px 2px rgba(33, 25, 81, 0.04), 0 1px 3px rgba(33, 25, 81, 0.06);
            --shadow-md: 0 4px 12px rgba(33, 25, 81, 0.06), 0 2px 6px rgba(33, 25, 81, 0.05);
            --shadow-lg: 0 12px 28px rgba(33, 25, 81, 0.10);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2.5rem 1rem;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 720px; margin: 0 auto; }
        .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.5rem; }
        h1 { font-size: 1.9rem; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
        .subtitle { color: var(--text-dim); font-size: 13px; }

        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
        .stat-card {
            background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border);
            padding: 0.85rem 0.75rem; text-align: center; box-shadow: var(--shadow-sm);
            transition: transform .15s ease, box-shadow .15s ease;
        }
        .stat-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .stat-num { font-size: 22px; font-weight: 600; color: var(--primary); letter-spacing: -0.01em; }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }

        /* Form */
        .form-card {
            background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border);
            padding: 1.25rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-sm);
        }
        .form-row { margin-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select, textarea {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            font-size: 14px; background: var(--surface); color: var(--text); font-family: inherit;
            transition: border-color .15s ease, box-shadow .15s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(127, 119, 221, 0.18);
        }
        textarea { resize: vertical; min-height: 60px; }

        /* Buttons */
        .btn {
            padding: 9px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
            background: var(--surface); font-size: 14px; cursor: pointer; font-weight: 500;
            transition: all .15s ease; font-family: inherit;
        }
        .btn:hover { border-color: var(--primary-light); }
        .btn-primary {
            background: var(--primary); color: white; border-color: var(--primary); width: 100%;
            box-shadow: 0 2px 6px rgba(83, 74, 183, 0.25);
        }
        .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-sm { padding: 5px 12px; font-size: 12.5px; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

        /* Toolbar */
        .toolbar {
            display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap;
            align-items: center; justify-content: space-between;
        }
        .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn {
            padding: 5px 14px; border-radius: 999px; border: 1px solid var(--border);
            background: var(--surface); font-size: 13px; cursor: pointer; font-weight: 500;
            color: var(--text-muted); transition: all .15s ease;
        }
        .filter-btn:hover { border-color: var(--primary-light); color: var(--primary); }
        .filter-btn.active {
            background: var(--primary); color: white; border-color: var(--primary);
            box-shadow: 0 2px 6px rgba(83, 74, 183, 0.20);
        }
        .sort-bar { display: flex; align-items: center; gap: 6px; }
        .sort-bar label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
        .sort-bar select { width: auto; padding: 6px 10px; font-size: 13px; }

        .search-row { margin-bottom: 1rem; position: relative; }
        .search-row input { padding-left: 38px; }
        .search-row::before {
            content: ""; position: absolute; left: 13px; top: 50%; width: 16px; height: 16px;
            transform: translateY(-50%);
            background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239b98a8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>") center/contain no-repeat;
            pointer-events: none;
        }

        /* Todo items */
        .todo-list { display: flex; flex-direction: column; gap: 10px; }
        .todo-item {
            background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border);
            padding: 1rem 1.25rem; display: flex; align-items: flex-start; gap: 12px;
            box-shadow: var(--shadow-sm); transition: all .2s ease;
            animation: slideIn .25s ease;
        }
        .todo-item:hover { box-shadow: var(--shadow-md); border-color: #d8d4e6; }
        .todo-item.completed { opacity: 0.55; }
        .todo-item.completed .todo-title { text-decoration: line-through; color: var(--text-muted); }
        .checkbox {
            width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary);
            flex-shrink: 0; margin-top: 2px;
        }
        .todo-content { flex: 1; min-width: 0; }
        .todo-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .todo-title { font-size: 15px; font-weight: 500; color: var(--text); word-break: break-word; }
        .todo-desc { font-size: 13px; color: var(--text-muted); margin-top: 4px; word-break: break-word; }
        .todo-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 12px; color: var(--text-dim); flex-wrap: wrap; }
        .todo-due { display: inline-flex; align-items: center; gap: 4px; }
        .todo-due.overdue { color: var(--danger); font-weight: 500; }
        .todo-actions { display: flex; gap: 6px; flex-shrink: 0; }

        .priority-badge {
            font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.03em;
        }
        .priority-1 { background: #FCEBEB; color: #A32D2D; }
        .priority-2 { background: #FAEEDA; color: #854F0B; }
        .priority-3 { background: #EAF3DE; color: #3B6D11; }

        .empty {
            text-align: center; color: var(--text-dim); padding: 3rem 1rem;
            font-size: 14px; background: var(--surface); border-radius: var(--radius-md);
            border: 1px dashed var(--border);
        }
        .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: white; padding: 10px 18px; border-radius: var(--radius-sm);
            font-size: 13px; box-shadow: var(--shadow-lg); opacity: 0; pointer-events: none;
            transition: opacity .2s ease, transform .2s ease;
            z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
        .toast.error { background: var(--danger); }

        /* Edit dialog */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(33, 25, 81, 0.35);
            display: none; align-items: center; justify-content: center; z-index: 50;
            backdrop-filter: blur(2px);
        }
        .modal-backdrop.show { display: flex; animation: fadeIn .15s ease; }
        .modal {
            background: var(--surface); border-radius: var(--radius-lg); padding: 1.5rem;
            width: min(440px, calc(100% - 2rem)); box-shadow: var(--shadow-lg);
            animation: popIn .2s ease;
        }
        .modal h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
        .modal-actions .btn { width: auto; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 540px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .form-grid { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .sort-bar { justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>To-Do List</h1>
            <span class="subtitle" id="dateLabel"></span>
        </div>

        <div class="stats">
            <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-num" id="statPending">0</div><div class="stat-label">Pending</div></div>
            <div class="stat-card"><div class="stat-num" id="statCompleted">0</div><div class="stat-label">Done</div></div>
            <div class="stat-card"><div class="stat-num" id="statHigh">0</div><div class="stat-label">High</div></div>
        </div>

        <div class="form-card">
            <div class="form-row">
                <input id="title" type="text" placeholder="할 일을 입력하세요" maxlength="500" />
            </div>
            <div class="form-row">
                <textarea id="description" placeholder="설명 (선택)"></textarea>
            </div>
            <div class="form-grid">
                <select id="priority">
                    <option value="1">🔴 우선순위 높음</option>
                    <option value="2" selected>🟡 우선순위 보통</option>
                    <option value="3">🟢 우선순위 낮음</option>
                </select>
                <input id="dueDate" type="date" />
            </div>
            <button class="btn btn-primary" id="addBtn">＋ 추가하기</button>
        </div>

        <div class="search-row">
            <input id="search" type="text" placeholder="제목 또는 설명으로 검색..." />
        </div>

        <div class="toolbar">
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="active">진행중</button>
                <button class="filter-btn" data-filter="completed">완료</button>
                <button class="filter-btn" data-filter="high">우선순위 높음</button>
            </div>
            <div class="sort-bar">
                <label for="sort">정렬</label>
                <select id="sort">
                    <option value="created_at:desc">최근 추가순</option>
                    <option value="created_at:asc">오래된 순</option>
                    <option value="due_date:asc">마감 임박순</option>
                    <option value="priority:asc">우선순위 높은순</option>
                    <option value="title:asc">제목순</option>
                </select>
            </div>
        </div>

        <div class="todo-list" id="todoList"></div>
    </div>

    <div class="modal-backdrop" id="editModal">
        <div class="modal">
            <h2>To-Do 수정</h2>
            <div class="form-row"><input id="editTitle" type="text" maxlength="500" /></div>
            <div class="form-row"><textarea id="editDescription"></textarea></div>
            <div class="form-grid">
                <select id="editPriority">
                    <option value="1">🔴 우선순위 높음</option>
                    <option value="2">🟡 우선순위 보통</option>
                    <option value="3">🟢 우선순위 낮음</option>
                </select>
                <input id="editDueDate" type="date" />
            </div>
            <div class="modal-actions">
                <button class="btn" id="editCancel">취소</button>
                <button class="btn btn-primary" id="editSave" style="width:auto;">저장</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = "/todos";
        const $ = (s) => document.querySelector(s);
        const state = { filter: "all", sort: "created_at", order: "desc", search: "", editing: null };

        // ----- helpers -----
        const escapeHtml = (s) => (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
        const fmtDate = (s) => {
            if (!s) return "";
            const d = new Date(s);
            if (isNaN(d)) return "";
            return d.toLocaleDateString("ko-KR", { month: "short", day: "numeric" });
        };
        const isOverdue = (s, completed) => {
            if (!s || completed) return false;
            const d = new Date(s);
            const today = new Date(); today.setHours(0,0,0,0);
            return d < today;
        };
        const toast = (msg, type = "info") => {
            const el = $("#toast");
            el.textContent = msg;
            el.className = "toast show" + (type === "error" ? " error" : "");
            setTimeout(() => el.classList.remove("show"), 1800);
        };
        const priorityLabel = (p) => ({1:"높음", 2:"보통", 3:"낮음"})[p] || "보통";

        // ----- API -----
        async function api(method, url, body) {
            const opts = { method, headers: { "Content-Type": "application/json" } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || `HTTP ${res.status}`);
            }
            return res.json();
        }

        async function loadTodos() {
            const params = new URLSearchParams();
            if (state.filter === "active") params.set("completed", "false");
            else if (state.filter === "completed") params.set("completed", "true");
            else if (state.filter === "high") params.set("priority", "1");
            if (state.search) params.set("search", state.search);
            params.set("sort", state.sort);
            params.set("order", state.order);

            const todos = await api("GET", `${API}?${params}`);
            render(todos);
            loadStats();
        }

        async function loadStats() {
            try {
                const s = await api("GET", `${API}/stats`);
                $("#statTotal").textContent = s.total;
                $("#statPending").textContent = s.pending;
                $("#statCompleted").textContent = s.completed;
                $("#statHigh").textContent = s.high_priority_pending;
            } catch (e) { /* ignore */ }
        }

        function render(todos) {
            const list = $("#todoList");
            if (!todos.length) {
                list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>표시할 항목이 없습니다</div>`;
                return;
            }
            list.innerHTML = todos.map(t => `
                <div class="todo-item ${t.completed ? "completed" : ""}" data-id="${t.id}">
                    <input type="checkbox" class="checkbox" ${t.completed ? "checked" : ""} data-action="toggle" />
                    <div class="todo-content">
                        <div class="todo-title-row">
                            <span class="todo-title">${escapeHtml(t.title)}</span>
                            <span class="priority-badge priority-${t.priority}">${priorityLabel(t.priority)}</span>
                        </div>
                        ${t.description ? `<div class="todo-desc">${escapeHtml(t.description)}</div>` : ""}
                        ${t.due_date ? `<div class="todo-meta"><span class="todo-due ${isOverdue(t.due_date, t.completed) ? "overdue" : ""}">📅 ${fmtDate(t.due_date)}</span></div>` : ""}
                    </div>
                    <div class="todo-actions">
                        <button class="btn btn-sm" data-action="edit">수정</button>
                        <button class="btn btn-sm btn-danger" data-action="delete">삭제</button>
                    </div>
                </div>
            `).join("");
        }

        // ----- handlers -----
        async function addTodo() {
            const title = $("#title").value.trim();
            if (!title) { toast("제목을 입력하세요", "error"); return; }
            const description = $("#description").value.trim();
            const priority = parseInt($("#priority").value, 10);
            const dueRaw = $("#dueDate").value;
            const due_date = dueRaw ? new Date(dueRaw).toISOString() : null;

            try {
                await api("POST", API, { title, description, priority, due_date, completed: false });
                $("#title").value = "";
                $("#description").value = "";
                $("#dueDate").value = "";
                $("#priority").value = "2";
                $("#title").focus();
                toast("추가되었습니다");
                loadTodos();
            } catch (e) { toast(e.message, "error"); }
        }

        async function toggleTodo(id, completed) {
            try {
                await api("PATCH", `${API}/${id}`, { completed });
                loadTodos();
            } catch (e) { toast(e.message, "error"); }
        }

        async function deleteTodo(id) {
            if (!confirm("이 항목을 삭제할까요?")) return;
            try {
                await api("DELETE", `${API}/${id}`);
                toast("삭제되었습니다");
                loadTodos();
            } catch (e) { toast(e.message, "error"); }
        }

        function openEdit(todo) {
            state.editing = todo;
            $("#editTitle").value = todo.title;
            $("#editDescription").value = todo.description || "";
            $("#editPriority").value = String(todo.priority || 2);
            $("#editDueDate").value = todo.due_date ? todo.due_date.slice(0, 10) : "";
            $("#editModal").classList.add("show");
            setTimeout(() => $("#editTitle").focus(), 50);
        }

        function closeEdit() {
            state.editing = null;
            $("#editModal").classList.remove("show");
        }

        async function saveEdit() {
            if (!state.editing) return;
            const title = $("#editTitle").value.trim();
            if (!title) { toast("제목을 입력하세요", "error"); return; }
            const dueRaw = $("#editDueDate").value;
            const payload = {
                title,
                description: $("#editDescription").value.trim(),
                priority: parseInt($("#editPriority").value, 10),
                due_date: dueRaw ? new Date(dueRaw).toISOString() : null,
            };
            try {
                await api("PATCH", `${API}/${state.editing.id}`, payload);
                toast("수정되었습니다");
                closeEdit();
                loadTodos();
            } catch (e) { toast(e.message, "error"); }
        }

        // ----- events -----
        document.addEventListener("DOMContentLoaded", () => {
            const today = new Date();
            $("#dateLabel").textContent = today.toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric", weekday: "long" });

            $("#addBtn").addEventListener("click", addTodo);
            $("#title").addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addTodo(); } });

            $("#search").addEventListener("input", e => {
                state.search = e.target.value.trim();
                clearTimeout(window._sd);
                window._sd = setTimeout(loadTodos, 250);
            });

            $("#sort").addEventListener("change", e => {
                const [s, o] = e.target.value.split(":");
                state.sort = s; state.order = o;
                loadTodos();
            });

            $("#filterBar").addEventListener("click", e => {
                const btn = e.target.closest(".filter-btn");
                if (!btn) return;
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                state.filter = btn.dataset.filter;
                loadTodos();
            });

            $("#todoList").addEventListener("click", async (e) => {
                const item = e.target.closest(".todo-item");
                if (!item) return;
                const id = parseInt(item.dataset.id, 10);
                const action = e.target.dataset.action;
                if (action === "toggle") {
                    toggleTodo(id, e.target.checked);
                } else if (action === "delete") {
                    deleteTodo(id);
                } else if (action === "edit") {
                    try {
                        const all = await api("GET", `${API}?sort=created_at&order=desc`);
                        const todo = all.find(t => t.id === id);
                        if (todo) openEdit(todo);
                    } catch (err) { toast(err.message, "error"); }
                }
            });

            $("#editCancel").addEventListener("click", closeEdit);
            $("#editSave").addEventListener("click", saveEdit);
            $("#editModal").addEventListener("click", e => { if (e.target.id === "editModal") closeEdit(); });
            document.addEventListener("keydown", e => { if (e.key === "Escape") closeEdit(); });

            loadTodos();
        });
    </script>
</body>
</html>
