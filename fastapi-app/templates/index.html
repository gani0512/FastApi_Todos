<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; min-height: 100vh; padding: 2rem 1rem; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a1a; }
        .form-card { background: white; border-radius: 12px; border: 0.5px solid #ddd; padding: 1.25rem; margin-bottom: 1.5rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; background: white; color: #1a1a1a; }
        input:focus, select:focus { outline: none; border-color: #7F77DD; }
        .btn { padding: 8px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: white; font-size: 14px; cursor: pointer; }
        .btn-primary { background: #534AB7; color: white; border-color: #534AB7; width: 100%; }
        .btn-primary:hover { background: #3C3489; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn-danger { border-color: #E24B4A; color: #E24B4A; }
        .btn-danger:hover { background: #FCEBEB; }
        .todo-item { background: white; border-radius: 12px; border: 0.5px solid #ddd; padding: 1rem 1.25rem; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .todo-item.completed { opacity: 0.6; }
        .todo-content { flex: 1; }
        .todo-title { font-size: 15px; font-weight: 500; color: #1a1a1a; }
        .todo-desc { font-size: 13px; color: #666; margin-top: 2px; }
        .todo-actions { display: flex; gap: 6px; }
        .priority-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
        .priority-1 { background: #FCEBEB; color: #A32D2D; }
        .priority-2 { background: #FAEEDA; color: #854F0B; }
        .priority-3 { background: #EAF3DE; color: #3B6D11; }
        .priority-label { font-size: 12px; color: #888; margin-bottom: 4px; }
        .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn { padding: 4px 12px; border-radius: 20px; border: 0.5px solid #ccc; background: white; font-size: 13px; cursor: pointer; }
        .filter-btn.active { background: #534AB7; color: white; border-color: #534AB7; }
        .sort-bar { display: flex; align-items: center; gap: 6px; }
        .sort-bar label { font-size: 13px; color: #666; white-space: nowrap; }
        .sort-bar select { width: auto; padding: 4px 8px; font-size: 13px; }
        .empty { text-align: center; color: #999; padding: 2rem; font-size: 14px; }
        .checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #534AB7; flex-shrink: 0; }
        .stats { display: flex; gap: 12px; margin-bottom: 1rem; }
        .stat-card { background: white; border-radius: 8px; border: 0.5px solid #ddd; padding: 0.75rem 1rem; flex: 1; text-align: center; }
        .stat-num { font-size: 20px; font-weight: 500; color: #534AB7; }
        .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
    </style>
</head>
<body>

        <h1>To-Do List</h1>
